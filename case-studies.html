<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DeepAnnotate &#8212; Case Studies</title>
  <meta name="description" content="Read case studies on how DeepAnnotate powers leading AI systems across autonomous vehicles and medical AI."/>
  <meta name="theme-color" content="#08111F"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  
  <link rel="stylesheet" href="./css/results.css"/>
  <link rel="stylesheet" href="./css/datasets.css"/>
  <link rel="stylesheet" href="./css/cta.css"/>
  <link rel="stylesheet" href="./css/footer.css"/>
  
  <style>
    :root {
      --bg-deep: #08111F;
      --bg-panel: #0D1B2E;
      --card-bg: rgba(19, 36, 59, 0.6);
      --cyan: #00D4FF;
      --border-sub: rgba(255, 255, 255, 0.08);
      --text-secondary: #A8B3CF;
    }
    body {
      background: var(--bg-deep);
      color: #fff;
      font-family: 'Inter', sans-serif;
      margin: 0;
      overflow-x: hidden;
    }
    .section-wrap { max-width: 1240px; margin: 0 auto; padding: 0 40px; }
    .section-pad { padding-top: 140px; padding-bottom: 80px; }
    
    .filter-chip {
      padding: 10px 22px;
      border-radius: 8px;
      background: transparent;
      border: 1px solid var(--border-sub);
      color: var(--text-secondary);
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s;
    }
    .filter-chip.active {
      background: var(--cyan);
      border-color: var(--cyan);
      color: #08111F;
    }
    .filter-chip:hover:not(.active) {
      border-color: var(--cyan);
      color: #fff;
    }

    .case-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
      margin-top: 40px;
    }
    .case-card {
      background: #091322;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .case-card:hover {
      transform: translateY(-5px);
      border-color: rgba(0, 212, 255, 0.3);
    }
    .case-thumb {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }
    .case-body {
      padding: 24px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .case-tag {
      font-size: 12px;
      color: var(--cyan);
      font-weight: 600;
      margin-bottom: 8px;
      display: block;
    }
    .case-title {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.3;
      margin: 0 0 8px 0;
      color: #fff;
    }
    .case-desc {
      font-size: 13.5px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin: 0 0 20px 0;
    }
    
    /* Stats Layout */
    .case-stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-box {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      padding: 12px;
    }
    .stat-val {
      font-size: 16px;
      font-weight: 800;
      color: #10B981; /* Green success stat color from screenshot */
    }
    .stat-lbl {
      font-size: 10px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 4px;
    }
  </style>
</head>
<body>

<!-- 1. HEADER NAVBAR -->
<nav id="navbar" style="position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:68px;background:rgba(8,17,31,0.85);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.06);">
  <a href="./index.html" class="nav-brand"><img src="./logo.svg" alt="DeepAnnotate Logo" style="height: 40px; width: auto;"/></a>
  <ul class="nav-links" style="display:flex;align-items:center;gap:32px;list-style:none;">
    <li><a href="./services.html" style="font-size:13.5px;font-weight:500;color:var(--text-secondary);">Services</a></li>
    <li><a href="./how-it-works.html" style="font-size:13.5px;font-weight:500;color:var(--text-secondary);">How It Works</a></li>
    <li><a href="./datasets.html" style="font-size:13.5px;font-weight:500;color:var(--text-secondary);">Datasets</a></li>
    <li><a href="./case-studies.html" style="font-size:13.5px;font-weight:500;color:var(--text-secondary);">Case Studies</a></li>
    <li><a href="./blog.html" style="font-size:13.5px;font-weight:500;color:var(--text-secondary);">Blog</a></li>
    <li><a href="./about.html" style="font-size:13.5px;font-weight:500;color:var(--text-secondary);">About</a></li>
  </ul>
  <a href="./contact.html" class="nav-cta" style="display:inline-flex;align-items:center;gap:7px;padding:10px 22px;border-radius:100px;font-size:13.5px;font-weight:600;color:#0E1F3E;background:linear-gradient(90deg,#0BA8D3,#FFBA08);transition:all 0.3s;box-shadow: 0 4px 12px rgba(11,168,211,0.15);">Connect to us</a>
</nav>

<!-- 2. HERO -->
<section class="section-pad" style="text-align: center; padding-bottom: 40px;">
  <div class="section-wrap">
    <h1 style="font-size: clamp(38px, 5.5vw, 56px); font-weight: 800; line-height: 1.1; margin-bottom: 16px; background: linear-gradient(135deg, #00D4FF, #00A6C7); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Real Results. Real Impact.</h1>
    <p style="color: var(--text-secondary); max-width: 720px; margin: 0 auto 32px; font-size: 16px; line-height: 1.6;">See how AI teams use DeepAnnotate to build better models, faster.</p>
    
    <div style="display: flex; gap: 20px; align-items: center; justify-content: center; flex-wrap: wrap; margin-bottom: 40px;">
      <div style="display: flex; gap: 8px; flex-wrap: wrap;" id="cs-chips-container">
        <button class="filter-chip active" data-filter="all">All</button>
        <button class="filter-chip" data-filter="audio / voice ai">Audio / Voice AI</button>
        <button class="filter-chip" data-filter="image / computer vision">Image / Computer Vision</button>
        <button class="filter-chip" data-filter="video / autonomous driving">Video / Autonomous Driving</button>
        <button class="filter-chip" data-filter="video / physical ai">Video / Physical AI</button>
        <button class="filter-chip" data-filter="video / robotics">Video / Robotics</button>
      </div>
    </div>

    <!-- Case Studies Dynamic Grid -->
    <div class="case-grid" id="case-studies-grid"></div>
  </div>
</section>

<!-- 3. REUSABLE FOOTER MOUNT PLACEHOLDER -->
<div id="footer-placeholder"></div>

<script type="module">
  document.addEventListener('DOMContentLoaded', () => {
    // Mount footer dynamically
    const footerContainer = document.getElementById('footer-placeholder');
    if (footerContainer) {
      fetch('./components/footer.html')
        .then(res => res.text())
        .then(html => {
          footerContainer.innerHTML = html;
        });
    }

    // Load case study data dynamically from JSON
    fetch('./js/case-studies-data.json')
      .then(res => res.json())
      .then(data => {
        const grid = document.getElementById('case-studies-grid');
        const renderCards = (list) => {
          grid.innerHTML = list.map(item => `
            <div class="case-card" data-category="${item.category.toLowerCase()}">
              <img class="case-thumb" src="${item.heroImage}" alt="${item.title}"/>
              <div class="case-body">
                <div>
                  <span class="case-tag">${item.badge}</span>
                  <h4 class="case-title" style="text-align: left;">${item.title}</h4>
                  <p class="case-desc" style="text-align: left;">${item.subtitle}</p>
                  
                  <div class="case-stats-grid">
                    <div class="stat-box">
                      <div class="stat-val" style="color:#10B981;">${item.metrics.accuracy}</div>
                      <div class="stat-lbl">${item.metricsLabels ? item.metricsLabels.accuracy : 'accuracy sustained'}</div>
                    </div>
                    <div class="stat-box">
                      <div class="stat-val" style="color:#10B981;">${item.metrics.datasetSize}</div>
                      <div class="stat-lbl">${item.metricsLabels ? item.metricsLabels.datasetSize : 'annotations delivered'}</div>
                    </div>
                    <div class="stat-box">
                      <div class="stat-val" style="color:#10B981;">${item.metrics.deliveryTime}</div>
                      <div class="stat-lbl">${item.metricsLabels ? item.metricsLabels.deliveryTime : 'turnaround'}</div>
                    </div>
                    <div class="stat-box">
                      <div class="stat-val" style="color:#10B981;">${item.metrics.annotators}</div>
                      <div class="stat-lbl">${item.metricsLabels ? item.metricsLabels.annotators : 'annotators deployed'}</div>
                    </div>
                  </div>
                </div>
                
                <div style="display: flex; justify-content: flex-start; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 16px;">
                  <a href="./case-studies/index.html?slug=${item.slug}" style="font-size: 13px; color: #fff; font-weight: 700; text-decoration:none; display:flex; align-items:center; gap:6px;">Read Full Case Study &rarr;</a>
                </div>
              </div>
            </div>
          `).join('');
        };

        renderCards(data);

        // Filter chips logic
        const chips = document.querySelectorAll('.filter-chip');

        const applyFilters = () => {
          const activeChip = document.querySelector('.filter-chip.active');
          const filterVal = activeChip ? activeChip.getAttribute('data-filter') : 'all';

          const filtered = data.filter(item => {
            return filterVal === 'all' || item.category.toLowerCase() === filterVal;
          });

          renderCards(filtered);
        };

        chips.forEach(chip => {
          chip.addEventListener('click', () => {
            chips.forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            applyFilters();
          });
        });
      });
  });
</script>
</body>
</html>
